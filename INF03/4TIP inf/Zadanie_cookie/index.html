<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Strona z bannerami</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Moje samochody</h1>

    <div class="banners">
        <div class="banner">
            <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=800" alt="BMW">
        </div>
        <div class="banner">
            <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?w=800" alt="Audi">
        </div>
        <div class="banner">
            <img src="https://images.unsplash.com/photo-1493238792000-8113da705763?w=800" alt="Mercedes">
        </div>
        <div class="banner">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800" alt="Auto sportowe">
        </div>
    </div>

    <div class="form-container">
        <form action="" method="post">
            <label>Wybierz banner:</label>
            <select name="banner">
                <option>Banner 1</option>
                <option>Banner 2</option>
                <option>Banner 3</option>
                <option>Banner 4</option>
            </select>
            <button type="button">Wybierz</button>
        </form>
    </div>
</header>

<main>
    <h2>Przykładowa treść</h2>
    <p>
        To jest przykładowa treść strony. Możesz tutaj dodać opis samochodów,
        ofertę, blog lub cokolwiek chcesz.
    </p>
    <p>
        Strona została przygotowana jako baza do dalszej rozbudowy.
    </p>
</main>

<footer>
    <p>&copy; 2026 Moja Strona - Wszelkie prawa zastrzeżone</p>
</footer>

<div id="cookie-box">
    <span>Ta strona używa plików cookies.</span>
    <form action="" method="">
        <button name="cookie">Zgadzam się</button>
    </form>
</div>

</body>
</html>
